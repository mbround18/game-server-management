name: Rust Documentation Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  doc-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # de0fac2, https://github.com/actions/checkout/releases/latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # e97e2d8, https://github.com/dtolnay/rust-toolchain/releases/latest
        with:
          toolchain: stable

      - name: Cache Cargo artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # 27d5ce7, https://github.com/actions/cache/releases/latest
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-doc-quality-${{ hashFiles('**/Cargo.lock') }}

      - name: Clippy (all targets/features)
        run: cargo clippy --all-targets --all-features

      - name: Doctests (workspace)
        run: cargo test --doc --workspace

      - name: Public API report
        run: ./scripts/public-api-report.sh
