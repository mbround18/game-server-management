name: Docs to GitHub Pages

on:
  push:
    branches:
      - main # Trigger on push to main branch
  workflow_dispatch:

permissions:
  contents: read
  pages: write # Allow writing to the GitHub Pages site
  id-token: write # Required to authenticate with GitHub Pages

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-and-deploy: # Renamed job
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # de0fac2, https://github.com/actions/checkout/releases/latest
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # e97e2d8, https://github.com/dtolnay/rust-toolchain/releases/latest
        with:
          toolchain: stable

      - name: Cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # 27d5ce7, https://github.com/actions/cache/releases/latest
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-docs-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Docs
        run: cargo doc --workspace --no-deps --all-features

      - name: Create .nojekyll
        run: touch target/doc/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@435bb151ad19f07a20b85293638d562551bc4dd6 # v3.8.0, https://github.com/peaceiris/actions-gh-pages/releases/latest
        with:
          github_token: ${{ steps.app-token.outputs.token }} # Use the token generated by actions/create-github-app-token
          publish_dir: ./target/doc # Directory containing the built documentation
          publish_branch: gh-pages # The branch to deploy to (will be created if it doesn't exist)
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
