name: Docker Release

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths-ignore:
      - README.md

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number ||
    github.ref_name }}
  cancel-in-progress: true

jobs:
  rust:
    uses: mbround18/gh-reusable/.github/workflows/rust-build-n-test.yml@main

  docker-compose:
    needs:
      - rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # de0fac2, https://github.com/actions/checkout/releases/latest

      - name: Build images from compose
        run: |
          docker compose -f compose.yml build
