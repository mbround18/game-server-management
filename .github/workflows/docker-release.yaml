name: Docker Release

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths-ignore:
      - README.md
    tags:
      - "v*"

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number ||
    github.ref_name }}
  cancel-in-progress: true

jobs:
  rust:
    uses: mbround18/gh-reusable/.github/workflows/rust-build-n-test.yaml@ee2a5260549a69a99cbbb25a386aee9a4e628777
    permissions:
      contents: read
      pages: write
      id-token: write
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}

  publish-crates:
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    uses: mbround18/gh-reusable/.github/workflows/publish.yaml@ee2a5260549a69a99cbbb25a386aee9a4e628777
    with:
      target: rust-crate
      registry: crates.io
    secrets:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  docker-compose:
    needs:
      - rust
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # de0fac2, https://github.com/actions/checkout/releases/latest

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # 4907a6d, https://github.com/docker/login-action/releases/latest
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set VERSION from tag or use latest
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="latest"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Build images from compose
        run: |
          docker compose -f compose.yml build
        env:
          VERSION: ${{ env.VERSION }}

      - name: Push images to registry
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: |
          docker compose -f compose.yml push
        env:
          VERSION: ${{ env.VERSION }}
